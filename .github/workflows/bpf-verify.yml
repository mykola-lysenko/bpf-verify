name: BPF Verification Pipeline (pinned)

# Push-gating job: builds against the bpf-next commit pinned in KERNEL_PIN, so
# the result is reproducible. A red run here means *we* changed something that
# broke verification -- not that bpf-next drifted. Drift is caught separately by
# the non-gating tracking job (.github/workflows/bpf-verify-tracking.yml), whose
# failures are triaged as findings and drive KERNEL_PIN bumps (see
# docs/CI_KERNEL_PINNING.md).

on:
  push:
    branches: ["master", "main"]
  pull_request:
    branches: ["master", "main"]
  workflow_dispatch:   # allow manual runs

# Cancel in-progress runs for the same branch/PR to save runner minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Compile & verify
    runs-on: ubuntu-24.04

    env:
      UML_VERISTAT_DIR: ${{ github.workspace }}/bpf-verify/deps/bpf-uml-selftests/uml-veristat
      BPF_OUTPUT:       ${{ github.workspace }}/bpf-verify/output

    steps:
      # -----------------------------------------------------------------------
      # 1. Checkout bpf-verify (with uml-veristat submodule)
      # -----------------------------------------------------------------------
      - name: Checkout bpf-verify
        uses: actions/checkout@v4
        with:
          path: bpf-verify
          submodules: recursive

      # -----------------------------------------------------------------------
      # 1b. Free runner disk. The pinned job fills / with the bpf-next checkout
      #     + build, the LLVM toolchain, 200+ verified objects, the diff leg's
      #     per-target native binaries, and the full-verifier-log artifact
      #     (1M-insn boundary targets make that alone ~100s of MB). ubuntu-24.04
      #     ships ~25-30GB of preinstalled SDKs we never use; removing them
      #     keeps the disk from filling as the target count grows (a run failed
      #     with "No space left on device" once the diff leg reached 23 targets).
      # -----------------------------------------------------------------------
      - name: Free disk space
        run: |
          echo "Before:"; df -h / | tail -1
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc \
                      /usr/local/.ghcup /opt/hostedtoolcache/CodeQL \
                      /usr/local/share/powershell /usr/share/swift || true
          sudo docker image prune --all --force >/dev/null 2>&1 || true
          echo "After:"; df -h / | tail -1

      # -----------------------------------------------------------------------
      # 2. Build uml-veristat (provides LLVM, kernel source, UML kernel, veristat)
      #    The .build/ directory contains the LLVM toolchain and bpf-next kernel
      #    source used for BPF compilation.  ~/.local/share/uml-veristat/ contains
      #    the UML kernel binary and veristat binary used for verification.
      #    Both are cached; rebuild only when build.sh or patches change.
      # -----------------------------------------------------------------------
      - name: Cache uml-veristat build
        id: cache-uml-veristat
        uses: actions/cache@v4
        with:
          path: |
            ~/.local/share/uml-veristat
            ${{ env.UML_VERISTAT_DIR }}/.build/llvm-install
            ${{ env.UML_VERISTAT_DIR }}/.build/bpf-next
            ${{ env.UML_VERISTAT_DIR }}/.build/pahole-install
            # bpftool-output holds the libbpf.a + headers that build_runner.sh
            # links tools/bpf_runner against. Without it, cache-hit runs (which
            # skip build.sh) fail to build the runner ("bpf/libbpf.h: No such
            # file or directory").
            ${{ env.UML_VERISTAT_DIR }}/.build/bpftool-output
          # KERNEL_PIN is in the key: bumping the pin invalidates the cache and
          # forces a rebuild against the new pinned kernel. The -v2 tag forces a
          # one-time rebuild to repopulate the cache with bpftool-output.
          key: uml-veristat-pinned-v2-${{ hashFiles('bpf-verify/deps/bpf-uml-selftests/uml-veristat/build.sh', 'bpf-verify/deps/bpf-uml-selftests/uml-veristat/patches/**', 'bpf-verify/KERNEL_PIN') }}

      # Link libraries the runner needs on EVERY run: build_runner links
      # tools/bpf_runner against libbpf.a with -lelf -lz. The full build-deps
      # step below is cache-miss-only, so on a cache hit these must still be
      # installed or the runner link fails ("cannot find -lelf").
      - name: Install runtime link libraries
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libelf-dev zlib1g-dev

      - name: Install build dependencies
        if: steps.cache-uml-veristat.outputs.cache-hit != 'true'
        run: |
          sudo apt-get install -y \
            build-essential git bc flex bison \
            libelf-dev libssl-dev libdw-dev libdwarf-dev \
            pkg-config cmake ninja-build python3 \
            libcap-dev curl wget rsync zlib1g-dev

      # Pre-seed .build/bpf-next at the pinned commit from a kernel.org cgit
      # snapshot tarball, as a git repo (so build.sh's `git am` patch stack
      # applies). The fresh repo has no origin/<branch> ref, so build.sh's
      # UPSTREAM_REF falls back to HEAD and never resets to the moving tip --
      # locking the base without any submodule change. build.sh then runs
      # WITHOUT --update, applying its patch stack on top of the pin.
      - name: Pin bpf-next to KERNEL_PIN
        if: steps.cache-uml-veristat.outputs.cache-hit != 'true'
        working-directory: bpf-verify/deps/bpf-uml-selftests/uml-veristat
        run: |
          PIN="$(tr -d '[:space:]' < "${{ github.workspace }}/bpf-verify/KERNEL_PIN")"
          echo "Pinning bpf-next to ${PIN}"
          mkdir -p .build
          rm -rf .build/bpf-next
          URL="https://git.kernel.org/pub/scm/linux/kernel/git/bpf/bpf-next.git/snapshot/bpf-next-${PIN}.tar.gz"
          curl -fL --retry 3 --retry-delay 5 -o /tmp/bpf-next-pin.tar.gz "${URL}"
          mkdir -p .build/bpf-next
          tar -xzf /tmp/bpf-next-pin.tar.gz -C .build/bpf-next --strip-components=1
          rm -f /tmp/bpf-next-pin.tar.gz
          git -C .build/bpf-next init -q
          git -C .build/bpf-next -c user.email=ci@pin -c user.name=ci add -A
          git -C .build/bpf-next -c user.email=ci@pin -c user.name=ci commit -q -m "pinned bpf-next ${PIN}"
          echo "Pinned tree ready (tree of ${PIN}, no origin ref so build.sh won't reset)"

      - name: Build uml-veristat
        if: steps.cache-uml-veristat.outputs.cache-hit != 'true'
        working-directory: bpf-verify/deps/bpf-uml-selftests/uml-veristat
        run: |
          export PATH="${PWD}/.build/llvm-install/bin:${PATH}"
          # No --update: build.sh keeps the pinned bpf-next tree pre-seeded above.
          ./build.sh || true
          # Verify the essential artifacts were produced
          for f in ~/.local/share/uml-veristat/linux \
                   ~/.local/share/uml-veristat/veristat \
                   .build/llvm-install/bin/clang \
                   .build/bpf-next/Kconfig; do
            [ -e "$f" ] || { echo "::error::Missing artifact: $f"; exit 1; }
          done
        timeout-minutes: 45

      - name: Verify uml-veristat build
        run: |
          LLVM="${UML_VERISTAT_DIR}/.build/llvm-install"
          KSRC="${UML_VERISTAT_DIR}/.build/bpf-next"
          echo "Clang:      $("${LLVM}/bin/clang" --version | head -1)"
          echo "Kernel:     $(git -C "${KSRC}" log --oneline -1 2>/dev/null || echo 'unknown')"
          echo "UML kernel: $([ -x "${HOME}/.local/share/uml-veristat/linux" ] && echo 'OK' || echo 'MISSING')"
          echo "veristat:   $([ -x "${HOME}/.local/share/uml-veristat/veristat" ] && echo 'OK' || echo 'MISSING')"

      # -----------------------------------------------------------------------
      # 3. Generate build artifacts that the kernel build may not have produced
      #    (CRC lookup tables, OID registry data).  The full UML kernel build
      #    already generates autoconf.h, bounds.h, timeconst.h, asm-offsets.h,
      #    and compiler-version.h — no stubs needed.
      # -----------------------------------------------------------------------
      - name: Generate kernel build artifacts
        run: |
          KSRC="${UML_VERISTAT_DIR}/.build/bpf-next"

          # crc32table.h
          CRC32_GEN=$(find "$KSRC/lib" -name "gen_crc32table.c" 2>/dev/null | head -1)
          if [ -n "$CRC32_GEN" ]; then
            CRC32_DIR=$(dirname "$CRC32_GEN")
            if [ ! -f "$CRC32_DIR/crc32table.h" ]; then
              cc -I"$KSRC/include" -I"$KSRC/include/uapi" \
                -o /tmp/gen_crc32table "$CRC32_GEN" && \
                /tmp/gen_crc32table > "$CRC32_DIR/crc32table.h" && \
                echo "Generated $CRC32_DIR/crc32table.h" || \
                echo "::warning::Could not generate crc32table.h"
            else
              echo "crc32table.h already present"
            fi
          fi

          # crc64table.h
          CRC64_GEN=$(find "$KSRC/lib" -name "gen_crc64table.c" 2>/dev/null | head -1)
          if [ -n "$CRC64_GEN" ]; then
            CRC64_DIR=$(dirname "$CRC64_GEN")
            if [ ! -f "$CRC64_DIR/crc64table.h" ]; then
              cc -I"$KSRC/include" -I"$KSRC/include/uapi" \
                -o /tmp/gen_crc64table "$CRC64_GEN" && \
                /tmp/gen_crc64table > "$CRC64_DIR/crc64table.h" && \
                echo "Generated $CRC64_DIR/crc64table.h" || \
                echo "::warning::Could not generate crc64table.h"
            else
              echo "crc64table.h already present"
            fi
          fi

          # oid_registry_data.c -- the generator moved from scripts/ to lib/
          # and now takes <in-h-file> <out-c-file> arguments (older trees
          # read lib/oid_registry.c from stdin), so try both forms.
          if [ ! -f "$KSRC/lib/oid_registry_data.c" ]; then
            OID_SCRIPT=$(find "$KSRC/lib" "$KSRC/scripts" -name "build_OID_registry" 2>/dev/null | head -1)
            if [ -n "$OID_SCRIPT" ]; then
              perl "$OID_SCRIPT" "$KSRC/include/linux/oid_registry.h" \
                  "$KSRC/lib/oid_registry_data.c" 2>/dev/null || \
              perl "$OID_SCRIPT" \
                  < "$KSRC/lib/oid_registry.c" \
                  > "$KSRC/lib/oid_registry_data.c" 2>/dev/null || \
                rm -f "$KSRC/lib/oid_registry_data.c"
            fi
            if [ -s "$KSRC/lib/oid_registry_data.c" ]; then
              echo "Generated oid_registry_data.c"
            else
              echo "::warning::build_OID_registry failed or not found, creating stub"
              printf 'static const unsigned char oid_data[1] = { 0 };\nstatic const unsigned char oid_index[OID__NR + 1] = { 0 };\nstatic const struct { unsigned char hash; enum OID oid; } oid_search_table[1] = { { 0, 0 } };\n' \
                > "$KSRC/lib/oid_registry_data.c"
            fi
          else
            echo "oid_registry_data.c already present"
          fi

      # -----------------------------------------------------------------------
      # 3b. Check that functions copied into shims/ still match the kernel
      #     source. Adapted functions report drift as warnings; a function
      #     that vanished from the kernel (rename/move) fails the job.
      # -----------------------------------------------------------------------
      - name: Check shim drift against kernel source
        working-directory: bpf-verify
        env:
          BPF_KSRC: ${{ env.UML_VERISTAT_DIR }}/.build/bpf-next
        run: python3 scripts/check_shim_drift.py

      # -----------------------------------------------------------------------
      # 3c. Build the fuzz-execution runner (links the submodule's libbpf).
      #     Phase 3 of the pipeline runs execute:true targets through it.
      # -----------------------------------------------------------------------
      - name: Build bpf_runner
        working-directory: bpf-verify
        run: bash tools/build_runner.sh

      # -----------------------------------------------------------------------
      # 3d. Install clang-23 for the pipeline's BPF compilation. The uml-veristat
      #     build above keeps its own (prebuilt 22.1.8) LLVM for building the UML
      #     kernel + veristat -- those are unaffected. Only the target objects are
      #     compiled with clang-23, which is needed for global functions and >5-arg
      #     static subprograms (see analysis/global_functions_and_inlining.md).
      #     apt.llvm.org ships clang-23 as a nightly snapshot of LLVM main.
      # -----------------------------------------------------------------------
      - name: Install clang-23 (apt.llvm.org)
        run: |
          . /etc/os-release
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key \
            | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc > /dev/null
          echo "deb https://apt.llvm.org/${VERSION_CODENAME}/ llvm-toolchain-${VERSION_CODENAME} main" \
            | sudo tee /etc/apt/sources.list.d/llvm-23.list > /dev/null
          sudo apt-get update -qq
          sudo apt-get install -y clang-23 llvm-23
          clang-23 --version | head -1

      # -----------------------------------------------------------------------
      # 4. Run the full pipeline (compile + verify via uml-veristat, then
      #    fuzz-execute the execute:true targets in the UML guest)
      # -----------------------------------------------------------------------
      - name: Run BPF verification pipeline
        working-directory: bpf-verify
        env:
          BPF_KSRC:         ${{ env.UML_VERISTAT_DIR }}/.build/bpf-next
          BPF_CLANG:        /usr/bin/clang-23
          BPF_LLVM_OBJCOPY: /usr/bin/llvm-objcopy-23
          BPF_VERISTAT:     ${{ env.UML_VERISTAT_DIR }}/uml-veristat
          # BPF_VERISTAT_VERBOSE intentionally OFF: it runs a second full
          # veristat -v pass over every target (doubling the verify step) to
          # write veristat_verbose_step1.txt, which nothing consumes -- gating
          # is off results.json, and the expect_failure boundary targets
          # capture their own diagnostics on demand (capture_verifier_log). To
          # debug an unexpected verify regression, re-run with the flag set.
        run: |
          set -o pipefail
          python3 pipeline.py 2>&1 | tee pipeline.log

      # -----------------------------------------------------------------------
      # 4b. Gate the results: compile failures, veristat skips, verifier
      #     failures, and per-target regressions against the committed
      #     baseline (missing targets, verdict changes, instruction-count
      #     collapse). To refresh the baseline after an intentional change:
      #       python3 scripts/check_results.py output/results.json --update-baseline
      #     and commit baseline/results.json.
      # -----------------------------------------------------------------------
      - name: Check results against baseline
        working-directory: bpf-verify
        run: python3 scripts/check_results.py output/results.json

      # -----------------------------------------------------------------------
      # 4c. Userspace sanitizer/property/differential fuzzing (ASan + UBSan),
      #     including the BPF-verifier tnum abstract-domain soundness check.
      #     Reaches code the verifier cannot load; a failure is a candidate
      #     finding. Iteration count kept modest to bound CI wall-clock.
      # -----------------------------------------------------------------------
      - name: Userspace property/soundness fuzzing
        working-directory: bpf-verify
        env:
          BPF_KSRC: ${{ env.UML_VERISTAT_DIR }}/.build/bpf-next
        run: bash userspace/run.sh --iters 2000000

      # -----------------------------------------------------------------------
      # 4d. Native-vs-BPF differential leg: compile each diff/<name> target's
      #     kernel function both natively (host gcc + userspace shim) and to
      #     BPF (real pipeline config), run both on identical seeded inputs,
      #     and fail on any divergence -- a divergence means the BPF backend
      #     miscompiled real kernel code. Deterministic (fixed seed base), so
      #     it belongs in this pinned gate; iteration count bounds wall-clock.
      # -----------------------------------------------------------------------
      - name: Native-vs-BPF differential leg
        working-directory: bpf-verify
        env:
          BPF_KSRC:         ${{ env.UML_VERISTAT_DIR }}/.build/bpf-next
          BPF_CLANG:        /usr/bin/clang-23
          BPF_LLVM_OBJCOPY: /usr/bin/llvm-objcopy-23
        run: bash tools/diff_all.sh --iters 20000

      # -----------------------------------------------------------------------
      # 5. Report results as a job summary
      # -----------------------------------------------------------------------
      - name: Report results
        if: always()
        working-directory: bpf-verify
        run: |
          KSRC="${UML_VERISTAT_DIR}/.build/bpf-next"
          KERNEL_COMMIT=$(git -C "${KSRC}" rev-parse --short HEAD 2>/dev/null || echo 'unknown')
          echo "## BPF Verification Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Kernel commit:** \`${KERNEL_COMMIT}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ -f output/results.json ]; then
            SUCCESS=$(python3 -c "import json,sys; t=json.load(open('output/results.json'))['targets']; print(sum(1 for v in t.values() if v.get('verdict')=='success'))")
            FAILURE=$(python3 -c "import json,sys; t=json.load(open('output/results.json'))['targets']; print(sum(1 for v in t.values() if v.get('compiled') and v.get('verdict')!='success'))")
            echo "| Metric | Count |" >> "$GITHUB_STEP_SUMMARY"
            echo "|--------|-------|" >> "$GITHUB_STEP_SUMMARY"
            echo "| Veristat: success | $SUCCESS |" >> "$GITHUB_STEP_SUMMARY"
            echo "| Veristat: failure or skipped | $FAILURE |" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "<details><summary>Full veristat table</summary>" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            cat output/results.txt >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            echo "</details>" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "_No results file found (pipeline may have failed during compilation)._" \
              >> "$GITHUB_STEP_SUMMARY"
          fi

      # -----------------------------------------------------------------------
      # 6. Upload artifacts for debugging
      # -----------------------------------------------------------------------
      - name: Upload pipeline log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-log
          path: bpf-verify/pipeline.log
          if-no-files-found: ignore

      - name: Upload veristat results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: veristat-results
          path: |
            bpf-verify/output/results.txt
            bpf-verify/output/results.json
            bpf-verify/output/veristat.csv
            bpf-verify/output/execution.log
          if-no-files-found: ignore
