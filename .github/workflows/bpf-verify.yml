name: BPF Verification Pipeline

on:
  push:
    branches: ["master", "main"]
  pull_request:
    branches: ["master", "main"]
  workflow_dispatch:   # allow manual runs

# Cancel in-progress runs for the same branch/PR to save runner minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Compile & verify
    runs-on: ubuntu-24.04

    env:
      UML_VERISTAT_DIR: ${{ github.workspace }}/bpf-verify/deps/bpf-uml-selftests/uml-veristat
      BPF_OUTPUT:       ${{ github.workspace }}/bpf-verify/output

    steps:
      # -----------------------------------------------------------------------
      # 1. Checkout bpf-verify (with uml-veristat submodule)
      # -----------------------------------------------------------------------
      - name: Checkout bpf-verify
        uses: actions/checkout@v4
        with:
          path: bpf-verify
          submodules: recursive

      # -----------------------------------------------------------------------
      # 2. Build uml-veristat (provides LLVM, kernel source, UML kernel, veristat)
      #    The .build/ directory contains the LLVM toolchain and bpf-next kernel
      #    source used for BPF compilation.  ~/.local/share/uml-veristat/ contains
      #    the UML kernel binary and veristat binary used for verification.
      #    Both are cached; rebuild only when build.sh or patches change.
      # -----------------------------------------------------------------------
      - name: Cache uml-veristat build
        id: cache-uml-veristat
        uses: actions/cache@v4
        with:
          path: |
            ~/.local/share/uml-veristat
            ${{ env.UML_VERISTAT_DIR }}/.build/llvm-install
            ${{ env.UML_VERISTAT_DIR }}/.build/bpf-next
            ${{ env.UML_VERISTAT_DIR }}/.build/pahole-install
          key: uml-veristat-build-${{ hashFiles('bpf-verify/deps/bpf-uml-selftests/uml-veristat/build.sh', 'bpf-verify/deps/bpf-uml-selftests/uml-veristat/patches/*') }}

      - name: Install build dependencies
        if: steps.cache-uml-veristat.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            build-essential git bc flex bison \
            libelf-dev libssl-dev libdw-dev libdwarf-dev \
            pkg-config cmake ninja-build python3 \
            libcap-dev curl wget rsync zlib1g-dev

      - name: Build uml-veristat
        if: steps.cache-uml-veristat.outputs.cache-hit != 'true'
        working-directory: bpf-verify/deps/bpf-uml-selftests/uml-veristat
        run: |
          export PATH="${PWD}/.build/llvm-install/bin:${PATH}"
          ./build.sh || true
          # Verify the essential artifacts were produced
          for f in ~/.local/share/uml-veristat/linux \
                   ~/.local/share/uml-veristat/veristat \
                   .build/llvm-install/bin/clang \
                   .build/bpf-next/Kconfig; do
            [ -e "$f" ] || { echo "::error::Missing artifact: $f"; exit 1; }
          done
        timeout-minutes: 45

      - name: Verify uml-veristat build
        run: |
          LLVM="${UML_VERISTAT_DIR}/.build/llvm-install"
          KSRC="${UML_VERISTAT_DIR}/.build/bpf-next"
          echo "Clang:      $("${LLVM}/bin/clang" --version | head -1)"
          echo "Kernel:     $(git -C "${KSRC}" log --oneline -1 2>/dev/null || echo 'unknown')"
          echo "UML kernel: $([ -x "${HOME}/.local/share/uml-veristat/linux" ] && echo 'OK' || echo 'MISSING')"
          echo "veristat:   $([ -x "${HOME}/.local/share/uml-veristat/veristat" ] && echo 'OK' || echo 'MISSING')"

      # -----------------------------------------------------------------------
      # 3. Generate build artifacts that the kernel build may not have produced
      #    (CRC lookup tables, OID registry data).  The full UML kernel build
      #    already generates autoconf.h, bounds.h, timeconst.h, asm-offsets.h,
      #    and compiler-version.h — no stubs needed.
      # -----------------------------------------------------------------------
      - name: Generate kernel build artifacts
        run: |
          KSRC="${UML_VERISTAT_DIR}/.build/bpf-next"

          # crc32table.h
          CRC32_GEN=$(find "$KSRC/lib" -name "gen_crc32table.c" 2>/dev/null | head -1)
          if [ -n "$CRC32_GEN" ]; then
            CRC32_DIR=$(dirname "$CRC32_GEN")
            if [ ! -f "$CRC32_DIR/crc32table.h" ]; then
              cc -I"$KSRC/include" -I"$KSRC/include/uapi" \
                -o /tmp/gen_crc32table "$CRC32_GEN" && \
                /tmp/gen_crc32table > "$CRC32_DIR/crc32table.h" && \
                echo "Generated $CRC32_DIR/crc32table.h" || \
                echo "::warning::Could not generate crc32table.h"
            else
              echo "crc32table.h already present"
            fi
          fi

          # crc64table.h
          CRC64_GEN=$(find "$KSRC/lib" -name "gen_crc64table.c" 2>/dev/null | head -1)
          if [ -n "$CRC64_GEN" ]; then
            CRC64_DIR=$(dirname "$CRC64_GEN")
            if [ ! -f "$CRC64_DIR/crc64table.h" ]; then
              cc -I"$KSRC/include" -I"$KSRC/include/uapi" \
                -o /tmp/gen_crc64table "$CRC64_GEN" && \
                /tmp/gen_crc64table > "$CRC64_DIR/crc64table.h" && \
                echo "Generated $CRC64_DIR/crc64table.h" || \
                echo "::warning::Could not generate crc64table.h"
            else
              echo "crc64table.h already present"
            fi
          fi

          # oid_registry_data.c
          if [ ! -f "$KSRC/lib/oid_registry_data.c" ]; then
            OID_SCRIPT=$(find "$KSRC/scripts" -name "build_OID_registry" 2>/dev/null | head -1)
            if [ -n "$OID_SCRIPT" ] && [ -f "$KSRC/lib/oid_registry.c" ]; then
              perl "$OID_SCRIPT" \
                < "$KSRC/lib/oid_registry.c" \
                > "$KSRC/lib/oid_registry_data.c" 2>&1 && \
                echo "Generated oid_registry_data.c" || {
                echo "::warning::build_OID_registry failed, creating stub"
                printf 'static const unsigned char oid_data[1] = { 0 };\nstatic const unsigned char oid_index[OID__NR + 1] = { 0 };\nstatic const struct { unsigned char hash; enum OID oid; } oid_search_table[1] = { { 0, 0 } };\n' \
                  > "$KSRC/lib/oid_registry_data.c"
              }
            else
              echo "::warning::build_OID_registry not found, creating stub"
              printf 'static const unsigned char oid_data[1] = { 0 };\nstatic const unsigned char oid_index[OID__NR + 1] = { 0 };\nstatic const struct { unsigned char hash; enum OID oid; } oid_search_table[1] = { { 0, 0 } };\n' \
                > "$KSRC/lib/oid_registry_data.c"
            fi
          else
            echo "oid_registry_data.c already present"
          fi

      # -----------------------------------------------------------------------
      # 4. Run the full pipeline (compile + verify via uml-veristat)
      # -----------------------------------------------------------------------
      - name: Run BPF verification pipeline
        working-directory: bpf-verify
        env:
          BPF_KSRC:         ${{ env.UML_VERISTAT_DIR }}/.build/bpf-next
          BPF_CLANG:        ${{ env.UML_VERISTAT_DIR }}/.build/llvm-install/bin/clang
          BPF_LLVM_OBJCOPY: ${{ env.UML_VERISTAT_DIR }}/.build/llvm-install/bin/llvm-objcopy
          BPF_VERISTAT:     ${{ env.UML_VERISTAT_DIR }}/uml-veristat
        run: |
          python3 pipeline.py 2>&1 | tee pipeline.log
          # Fail the step if any target failed to compile
          if grep -qP '^\s*\[FAIL\]' pipeline.log; then
            echo "::error::One or more targets failed to compile"
            grep -P '^\s*\[FAIL\]' pipeline.log
            exit 1
          fi
          # Fail if any BPF program failed the verifier
          if [ -f output/results.txt ] && grep -qw "failure" output/results.txt; then
            echo "::error::One or more BPF programs failed the verifier"
            grep -w "failure" output/results.txt
            exit 1
          fi

      # -----------------------------------------------------------------------
      # 5. Report results as a job summary
      # -----------------------------------------------------------------------
      - name: Report results
        if: always()
        working-directory: bpf-verify
        run: |
          KSRC="${UML_VERISTAT_DIR}/.build/bpf-next"
          KERNEL_COMMIT=$(git -C "${KSRC}" rev-parse --short HEAD 2>/dev/null || echo 'unknown')
          echo "## BPF Verification Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Kernel commit:** \`${KERNEL_COMMIT}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ -f output/results.txt ]; then
            SUCCESS=$(grep -cw "success" output/results.txt || true)
            FAILURE=$(grep -cw "failure" output/results.txt || true)
            echo "| Metric | Count |" >> "$GITHUB_STEP_SUMMARY"
            echo "|--------|-------|" >> "$GITHUB_STEP_SUMMARY"
            echo "| Veristat: success | $SUCCESS |" >> "$GITHUB_STEP_SUMMARY"
            echo "| Veristat: failure | $FAILURE |" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "<details><summary>Full veristat table</summary>" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            cat output/results.txt >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            echo "</details>" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "_No results file found (pipeline may have failed during compilation)._" \
              >> "$GITHUB_STEP_SUMMARY"
          fi

      # -----------------------------------------------------------------------
      # 6. Upload artifacts for debugging
      # -----------------------------------------------------------------------
      - name: Upload pipeline log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-log
          path: bpf-verify/pipeline.log
          if-no-files-found: ignore

      - name: Upload veristat results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: veristat-results
          path: |
            bpf-verify/output/results.txt
            bpf-verify/output/veristat_verbose_step1.txt
          if-no-files-found: ignore
